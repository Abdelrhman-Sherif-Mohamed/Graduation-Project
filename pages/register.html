<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب - عيادة الشفاء</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="page-auth d-flex align-items-center justify-content-center p-3">

    <div class="reg-card card p-4 p-md-5" style="width:100%;max-width:500px;">
        <div class="text-center mb-3">
            <div class="rounded-circle d-inline-flex align-items-center justify-content-center mb-2"
                 style="width:60px;height:60px;background:var(--light-blue)">
                <i class="bi bi-person-plus-fill fs-3" style="color:var(--secondary-blue)"></i>
            </div>
            <h5 class="fw-bold mb-0" style="color:var(--secondary-blue)">إنشاء حساب جديد</h5>
            <p class="text-muted small">عيادة الشفاء</p>
        </div>

        <div id="alertBox" class="alert py-2 small d-none mb-3"></div>

        <form id="registerForm" novalidate>
            <div class="mb-3">
                <label class="form-label fw-semibold small">الاسم الكامل <span class="text-danger">*</span></label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person-fill"></i></span>
                    <input type="text" class="form-control p-3" id="fullName" placeholder="أدخل اسمك الكامل" required>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold small">البريد الإلكتروني <span class="text-danger">*</span></label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-envelope-fill"></i></span>
                    <input type="email" class="form-control p-3" id="emailInput" placeholder="example@email.com" required>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold small">كلمة المرور <span class="text-danger">*</span></label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                    <input type="password" class="form-control p-3" id="passwordInput" placeholder="6 أحرف على الأقل" required>
                    <button class="btn btn-outline-secondary" type="button" id="togglePass" tabindex="-1">
                        <i class="bi bi-eye" id="eyeIcon"></i>
                    </button>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold small">الرقم القومي <span class="text-danger">*</span></label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-card-text"></i></span>
                    <input type="text" class="form-control p-3" id="nationalId" placeholder="14 رقم" maxlength="14" required>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold small">رقم الهاتف <span class="text-danger">*</span></label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-telephone-fill"></i></span>
                    <input type="tel" class="form-control p-3" id="phone" placeholder="01xxxxxxxxxxxxxxxxx" required>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold small">رقم الواتساب</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-whatsapp"></i></span>
                    <input type="tel" class="form-control p-3" id="whatsapp" placeholder="01xxxxxxxxx">
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label fw-semibold small">العنوان <span class="text-danger">*</span></label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-geo-alt-fill"></i></span>
                    <input type="text" class="form-control p-3" id="address" placeholder="المدينة، الحي" required>
                </div>
            </div>

            <button type="submit" class="btn w-100 py-3 fw-bold text-white rounded-5"
                    style="background:var(--secondary-blue)" id="regBtn">
                <span id="btnText"><i class="bi bi-person-check-fill me-2"></i>إنشاء الحساب</span>
                <span id="btnSpinner" class="d-none">
                    <span class="spinner-border spinner-border-sm me-2"></span>جاري التسجيل...
                </span>
            </button>
        </form>

        <div class="text-center mt-3">
            <span class="text-muted small">عندك حساب؟ </span>
            <a href="login.html" class="fw-semibold small" style="color:var(--secondary-blue)">سجّل دخول</a>
        </div>
        <div class="text-center mt-2">
            <a href="../index.html" class="text-muted small"><i class="bi bi-arrow-right me-1"></i>الرجوع للرئيسية</a>
        </div>
    </div>

    <script type="module">
        import { auth, db } from "../js/firebase-config.js";
        import { createUserWithEmailAndPassword, updateProfile }
            from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
        import { doc, setDoc, serverTimestamp }
            from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        // toggle password visibility
        document.getElementById('togglePass').onclick = () => {
            const inp  = document.getElementById('passwordInput');
            const show = inp.type === 'password';
            inp.type   = show ? 'text' : 'password';
            document.getElementById('eyeIcon').className = show ? 'bi bi-eye-slash' : 'bi bi-eye';
        };

        document.getElementById('registerForm').onsubmit = async (e) => {
            e.preventDefault();

            const name       = document.getElementById('fullName').value.trim();
            const email      = document.getElementById('emailInput').value.trim();
            const password   = document.getElementById('passwordInput').value;
            const nationalId = document.getElementById('nationalId').value.trim();
            const phone      = document.getElementById('phone').value.trim();
            const whatsapp   = document.getElementById('whatsapp').value.trim();
            const address    = document.getElementById('address').value.trim();

            if (!name || !email || !password || !nationalId || !phone || !address) {
                showAlert('يرجى ملء جميع الحقول المطلوبة', 'warning'); return;
            }
            if (nationalId.length !== 14 || !/^\d+$/.test(nationalId)) {
                showAlert('الرقم القومي يجب أن يكون 14 رقماً', 'warning'); return;
            }
            if (password.length < 6) {
                showAlert('كلمة المرور يجب أن تكون 6 أحرف على الأقل', 'warning'); return;
            }

            setLoading(true);
            try {
                const cred = await createUserWithEmailAndPassword(auth, email, password);
                await updateProfile(cred.user, { displayName: name });

                await setDoc(doc(db, 'users', cred.user.uid), {
                    name,
                    email,
                    nationalId,
                    phone,
                    whatsapp: whatsapp || phone,
                    address,
                    role:      'patient',
                    createdAt: serverTimestamp()
                });

                localStorage.setItem('currentUser', JSON.stringify({
                    uid: cred.user.uid, email, name, role: 'patient'
                }));

                showAlert('تم إنشاء الحساب بنجاح ✓', 'success');
                setTimeout(() => { window.location.href = 'patient.html'; }, 900);

            } catch (err) {
                setLoading(false);
                const msgs = {
                    'auth/email-already-in-use': 'البريد الإلكتروني مسجّل مسبقاً',
                    'auth/invalid-email':        'صيغة البريد الإلكتروني غير صحيحة',
                    'auth/weak-password':        'كلمة المرور ضعيفة جداً',
                };
                showAlert(msgs[err.code] || 'حدث خطأ، حاول مرة أخرى', 'danger');
            }
        };

        function setLoading(on) {
            document.getElementById('btnText').classList.toggle('d-none', on);
            document.getElementById('btnSpinner').classList.toggle('d-none', !on);
            document.getElementById('regBtn').disabled = on;
        }
        function showAlert(msg, type) {
            const el = document.getElementById('alertBox');
            el.className = `alert alert-${type} py-2 small`;
            el.textContent = msg;
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
