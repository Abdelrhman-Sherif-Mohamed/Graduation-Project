<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حجوزاتي - عيادة الشفاء</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../css/style.css">

</head>
<body class="page-patient">
    <nav class="navbar navbar-expand-lg bg-nav sticky-top">
        <div class="container">
            <a class="navbar-brand" href="../index.html"><i class="bi bi-hospital text-white"> <span>عيادة الشفاء</span></i></a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link text-white" href="../index.html">الرئيسية</a></li>
                    <li class="nav-item"><a class="nav-link text-white" href="appointment.html">حجز موعد جديد</a></li>
                </ul>
                <div class="d-flex align-items-center gap-2">
                    <i class="bi bi-person-circle text-white fs-5"></i>
                    <span class="text-white fw-semibold" id="patientNameNav">...</span>
                    <button class="btn btn-outline-light btn-sm rounded-5 ms-2" id="logoutBtn">
                        <i class="bi bi-box-arrow-left me-1"></i>خروج
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <div class="container py-4">
        <div class="d-flex flex-column flex-md-row align-items-start align-items-md-center justify-content-between mb-4 gap-3">
            <div>
                <h4 class="fw-bold mb-1" style="color:var(--secondary-blue)">
                    <i class="bi bi-calendar2-heart me-2"></i>حجوزاتي
                </h4>
                <p class="text-muted mb-0" id="patientGreeting">مرحباً...</p>
            </div>
            <a href="appointment.html" class="btn text-white rounded-5 px-4" style="background:var(--secondary-blue)">
                <i class="bi bi-plus-circle me-2"></i>حجز موعد جديد
            </a>
        </div>

        <!-- Stats -->
        <div class="row g-3 mb-4">
            <div class="col-6 col-md-3">
                <div class="card stat-card shadow-sm p-3 text-center">
                    <h4 class="fw-bold mb-0" style="color:var(--secondary-blue)" id="totalCount">-</h4>
                    <small class="text-muted">إجمالي الحجوزات</small>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="card stat-card shadow-sm p-3 text-center">
                    <h4 class="fw-bold mb-0 text-warning" id="pendingCount">-</h4>
                    <small class="text-muted">في الانتظار</small>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="card stat-card shadow-sm p-3 text-center">
                    <h4 class="fw-bold mb-0 text-success" id="confirmedCount">-</h4>
                    <small class="text-muted">مؤكدة</small>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="card stat-card shadow-sm p-3 text-center">
                    <h4 class="fw-bold mb-0 text-danger" id="cancelledCount">-</h4>
                    <small class="text-muted">ملغية</small>
                </div>
            </div>
        </div>

        <!-- Loading -->
        <div id="loadingState" class="text-center py-5">
            <div class="spinner-border" style="color:var(--secondary-blue)"></div>
            <p class="text-muted mt-3">جاري تحميل حجوزاتك...</p>
        </div>

        <!-- Empty -->
        <div id="emptyState" class="text-center py-5 d-none">
            <i class="bi bi-calendar-x text-muted" style="font-size:4rem"></i>
            <p class="text-muted mt-3 fs-5">لا توجد حجوزات بعد</p>
            <a href="appointment.html" class="btn text-white rounded-5 px-4 mt-2" style="background:var(--secondary-blue)">احجز موعدك الأول</a>
        </div>

        <!-- Appointments -->
        <div class="row g-3" id="appointmentsList"></div>
    </div>

    <script type="module">
        import { auth, db } from "../js/firebase-config.js";
        import { onAuthStateChanged, signOut }
            from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
        import { collection, query, where, getDocs, doc, updateDoc, getDoc }
            from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        onAuthStateChanged(auth, async (user) => {
            if (!user) { window.location.href = 'login.html'; return; }

            // لو doctor أو admin، روّحه للداش بورد المناسب
            const userSnap = await getDoc(doc(db, 'users', user.uid));
            const userData = userSnap.exists() ? userSnap.data() : {};
            if (userData.role === 'doctor') { window.location.href = 'dashboard.html'; return; }
            if (userData.role === 'admin')  { window.location.href = 'create-doctors.html'; return; }

            const stored = JSON.parse(localStorage.getItem('currentUser') || '{}');
            const name   = stored.name || user.displayName || user.email;
            document.getElementById('patientNameNav').textContent = name;
            document.getElementById('patientGreeting').textContent = `مرحباً، ${name}`;

            await loadAppointments(user.uid);
        });

        document.getElementById('logoutBtn').onclick = async () => {
            await signOut(auth);
            localStorage.removeItem('currentUser');
            window.location.href = 'login.html';
        };

        async function loadAppointments(uid) {
            try {
                // بدون orderBy عشان نتجنب Composite Index
                const q = query(
                    collection(db, 'appointments'),
                    where('patientId', '==', uid)
                );
                const snap = await getDocs(q);
                const appts = snap.docs
                    .map(d => ({ id: d.id, ...d.data() }))
                    .sort((a, b) => {
                        // ترتيب تنازلي بالتاريخ
                        const ta = a.createdAt?.seconds || 0;
                        const tb = b.createdAt?.seconds || 0;
                        return tb - ta;
                    });

                document.getElementById('loadingState').classList.add('d-none');

                if (appts.length === 0) {
                    document.getElementById('emptyState').classList.remove('d-none');
                    updateStats([]);
                    return;
                }

                updateStats(appts);
                renderAppointments(appts);
            } catch (err) {
                document.getElementById('loadingState').innerHTML =
                    '<p class="text-danger">حدث خطأ في تحميل البيانات</p>';
            }
        }

        function updateStats(appts) {
            document.getElementById('totalCount').textContent     = appts.length;
            document.getElementById('pendingCount').textContent   = appts.filter(a => a.status === 'pending').length;
            document.getElementById('confirmedCount').textContent = appts.filter(a => a.status === 'confirmed').length;
            document.getElementById('cancelledCount').textContent = appts.filter(a => a.status === 'cancelled').length;
        }

        function renderAppointments(appts) {
            const list = document.getElementById('appointmentsList');
            list.innerHTML = appts.map(a => {
                const statusMap = {
                    pending:   { cls:'status-pending',   icon:'bi-hourglass-split',    label:'في الانتظار' },
                    confirmed: { cls:'status-confirmed', icon:'bi-check-circle-fill',  label:'مؤكد' },
                    cancelled: { cls:'status-cancelled', icon:'bi-x-circle-fill',      label:'ملغي' },
                };
                const s = statusMap[a.status] || statusMap.pending;
                const date = a.date ? new Date(a.date).toLocaleDateString('ar-EG', { weekday:'long', year:'numeric', month:'long', day:'numeric' }) : '';
                return `
                <div class="col-12" id="appt-${a.id}">
                    <div class="card appt-card shadow-sm p-4">
                        <div class="d-flex flex-column flex-md-row justify-content-between align-items-start gap-3">
                            <div class="d-flex gap-3 align-items-start">
                                <div class="rounded-circle d-flex align-items-center justify-content-center flex-shrink-0"
                                     style="width:52px;height:52px;background:var(--light-blue)">
                                    <i class="bi bi-person-badge-fill fs-4" style="color:var(--secondary-blue)"></i>
                                </div>
                                <div>
                                    <h6 class="fw-bold mb-1">${a.doctorName || 'الطبيب'}</h6>
                                    <p class="text-muted small mb-1"><i class="bi bi-grid me-1"></i>${a.specialty || ''}</p>
                                    <p class="text-muted small mb-0"><i class="bi bi-calendar3 me-1"></i>${date} — ${a.time || ''}</p>
                                    ${a.notes ? `<p class="text-muted small mb-0 mt-1"><i class="bi bi-chat-text me-1"></i>${a.notes}</p>` : ''}
                                </div>
                            </div>
                            <div class="d-flex flex-column align-items-end gap-2">
                                <span class="badge ${s.cls} px-3 py-2 rounded-3 fw-normal">
                                    <i class="bi ${s.icon} me-1"></i>${s.label}
                                </span>
                                ${a.status !== 'cancelled' ? `<button class="btn btn-sm btn-outline-danger rounded-5" onclick="cancelAppt('${a.id}', this)">إلغاء</button>` : ''}
                            </div>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        window.cancelAppt = async (id, btn) => {
            if (!confirm('هل أنت متأكد من إلغاء الحجز؟')) return;
            try {
                await updateDoc(doc(db, 'appointments', id), { status: 'cancelled' });
                const card = document.getElementById(`appt-${id}`);
                card.querySelector('.badge').className = 'badge status-cancelled px-3 py-2 rounded-3 fw-normal';
                card.querySelector('.badge').innerHTML = '<i class="bi bi-x-circle-fill me-1"></i>ملغي';
                btn.remove();
            } catch { alert('حدث خطأ، حاول مرة أخرى'); }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
