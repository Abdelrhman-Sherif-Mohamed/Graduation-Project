<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - عيادة الشفاء</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://unpkg.com/aos@2.3.4/dist/aos.css">
</head>
<body class="page-auth d-flex align-items-center justify-content-center p-3">

    <div class="login-card card p-4 p-md-5" style="width:100%;max-width:460px;" data-aos="zoom-in">

        <!-- Header -->
        <div class="text-center mb-4">
            <div class="rounded-circle d-inline-flex align-items-center justify-content-center mb-3"
                 style="width:70px;height:70px;background:var(--light-blue)">
                <i class="bi bi-hospital-fill fs-2" style="color:var(--secondary-blue)"></i>
            </div>
            <h4 class="fw-bold mb-1" style="color:var(--secondary-blue)">عيادة الشفاء</h4>
            <p class="text-muted small mb-0">سجّل دخولك للمتابعة</p>
        </div>

        <div id="alertBox" class="alert py-2 small d-none"></div>

        <form id="loginForm" novalidate>
            <div class="mb-3">
                <label class="form-label fw-semibold small">البريد الإلكتروني</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-envelope-fill"></i></span>
                    <input type="email" class="form-control p-3" id="emailInput" placeholder="example@email.com" required>
                </div>
            </div>

            <div class="mb-4">
                <div class="d-flex justify-content-between mb-1">
                    <label class="form-label fw-semibold small mb-0">كلمة المرور</label>
                    <a href="#" id="forgotLink" class="small" style="color:var(--primary-blue)">نسيت كلمة المرور؟</a>
                </div>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                    <input type="password" class="form-control p-3" id="passwordInput" placeholder="••••••••" required>
                    <button class="btn btn-outline-secondary" type="button" id="togglePass" tabindex="-1">
                        <i class="bi bi-eye" id="eyeIcon"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn w-100 py-3 fw-bold text-white rounded-5"
                    style="background:var(--secondary-blue)" id="loginBtn">
                <span id="btnText"><i class="bi bi-box-arrow-in-right me-2"></i>دخول</span>
                <span id="btnSpinner" class="d-none">
                    <span class="spinner-border spinner-border-sm me-2"></span>جاري التحقق...
                </span>
            </button>
        </form>

        <div class="divider my-4">أو</div>

        <div class="text-center mb-2">
            <span class="text-muted small">مش عندك حساب؟ </span>
            <a href="register.html" class="fw-semibold small" style="color:var(--secondary-blue)">سجّل دلوقتي</a>
        </div>
        <div class="text-center">
            <a href="../index.html" class="text-muted small"><i class="bi bi-arrow-right me-1"></i>الرجوع للرئيسية</a>
        </div>
    </div>

    <script type="module">
        import { auth } from "../js/firebase-config.js";
        import { signInWithEmailAndPassword, sendPasswordResetEmail }
            from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, collection, query, where, getDocs, setDoc }
            from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const db = getFirestore(auth.app);

        // toggle password visibility
        document.getElementById('togglePass').onclick = () => {
            const inp  = document.getElementById('passwordInput');
            const show = inp.type === 'password';
            inp.type   = show ? 'text' : 'password';
            document.getElementById('eyeIcon').className = show ? 'bi bi-eye-slash' : 'bi bi-eye';
        };

        // send password reset email
        document.getElementById('forgotLink').onclick = async (e) => {
            e.preventDefault();
            const email = document.getElementById('emailInput').value.trim();
            if (!email) { showAlert('أدخل بريدك الإلكتروني أولاً', 'warning'); return; }
            try {
                await sendPasswordResetEmail(auth, email);
                showAlert('تم إرسال رابط إعادة التعيين على بريدك ✓', 'success');
            } catch { showAlert('تعذّر إرسال البريد، تحقق من العنوان', 'danger'); }
        };

        // login form submit
        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const email    = document.getElementById('emailInput').value.trim();
            const password = document.getElementById('passwordInput').value;
            if (!email || !password) { showAlert('يرجى ملء جميع الحقول', 'warning'); return; }

            setLoading(true);
            try {
                const cred = await signInWithEmailAndPassword(auth, email, password);

                let snap = await getDoc(doc(db, 'users', cred.user.uid));
                let data = snap.exists() ? snap.data() : null;

                // fallback: search doctors collection by email
                if (!data || !data.role) {
                    const q    = query(collection(db, 'doctors'), where('email', '==', email));
                    const docs = await getDocs(q);
                    if (!docs.empty) {
                        data = docs.docs[0].data();
                        await setDoc(doc(db, 'users', cred.user.uid), {
                            ...data, uid: cred.user.uid, doctorId: data.id
                        });
                    } else {
                        data = {};
                    }
                }

                const role = data.role || 'patient';
                localStorage.setItem('currentUser', JSON.stringify({
                    uid:      cred.user.uid,
                    email:    cred.user.email,
                    name:     data.name || cred.user.displayName || email.split('@')[0],
                    role,
                    doctorId: data.doctorId || data.id || null
                }));

                showAlert('تم تسجيل الدخول بنجاح ✓', 'success');

                // redirect by role
                setTimeout(() => {
                    if (role === 'doctor')      window.location.href = 'dashboard.html';
                    else if (role === 'admin')  window.location.href = 'create-doctors.html';
                    else                        window.location.href = 'patient.html';
                }, 800);

            } catch (err) {
                setLoading(false);
                const msgs = {
                    'auth/user-not-found':    'البريد الإلكتروني غير مسجّل',
                    'auth/wrong-password':    'كلمة المرور غير صحيحة',
                    'auth/invalid-email':     'صيغة البريد الإلكتروني غير صحيحة',
                    'auth/too-many-requests': 'تم تجاوز عدد المحاولات، حاول لاحقاً',
                    'auth/invalid-credential':'البريد أو كلمة المرور غير صحيحة',
                };
                showAlert(msgs[err.code] || 'حدث خطأ، حاول مرة أخرى', 'danger');
            }
        };

        function setLoading(on) {
            document.getElementById('btnText').classList.toggle('d-none', on);
            document.getElementById('btnSpinner').classList.toggle('d-none', !on);
            document.getElementById('loginBtn').disabled = on;
        }

        function showAlert(msg, type) {
            const el = document.getElementById('alertBox');
            el.className = `alert alert-${type} py-2 small`;
            el.textContent = msg;
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
    <script>AOS.init({ duration: 600, once: true });</script>
</body>
</html>
