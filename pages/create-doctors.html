<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حسابات الأطباء - عيادة الشفاء</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../css/style.css">

</head>
<body class="page-admin d-flex align-items-start justify-content-center p-3 py-4">
<div class="main-card card p-4 p-md-5 w-100" style="max-width:860px;">

    <!-- Header -->
    <div class="text-center mb-4">
        <div class="rounded-circle d-inline-flex align-items-center justify-content-center mb-3"
             style="width:70px;height:70px;background:var(--light-blue)">
            <i class="bi bi-person-plus-fill fs-2" style="color:var(--secondary-blue)"></i>
        </div>
        <h4 class="fw-bold mb-1" style="color:var(--secondary-blue)">إنشاء حسابات الأطباء</h4>
        <p class="text-muted small mb-0">اختر التخصص وأنشئ حسابات الأطباء على Firebase</p>
    </div>

    <!-- Step 1: Login -->
    <div id="authSection">
        <div class="d-flex align-items-center gap-2 mb-3">
            <span class="step-badge">1</span>
            <span class="fw-semibold">تسجيل دخول Admin</span>
        </div>
        <div class="alert alert-info small rounded-3 mb-3">
            <i class="bi bi-info-circle-fill me-2"></i>
            تحتاج حساب Admin للإنشاء — لو مش عندك، اضغط <strong>"إنشاء Admin"</strong>
        </div>
        <div class="row g-2 mb-3">
            <div class="col-12 col-md-5">
                <input type="email" class="form-control" id="adminEmail" placeholder="البريد الإلكتروني">
            </div>
            <div class="col-12 col-md-4">
                <input type="password" class="form-control" id="adminPass" placeholder="كلمة المرور">
            </div>
            <div class="col-12 col-md-3 d-flex gap-2">
                <button class="btn flex-grow-1 text-white rounded-3" style="background:var(--secondary-blue)" id="loginBtn">
                    <i class="bi bi-box-arrow-in-right me-1"></i>دخول
                </button>
                <button class="btn btn-outline-primary rounded-3" id="createAdminBtn" title="إنشاء Admin جديد">
                    <i class="bi bi-person-plus"></i>
                </button>
            </div>
        </div>
        <div id="authAlert" class="d-none"></div>
    </div>

    <!-- Step 2: Select Specialty + Create -->
    <div id="mainSection" class="d-none">
        <div class="alert alert-success small rounded-3 mb-4">
            <i class="bi bi-check-circle-fill me-2"></i>
            مرحباً <strong id="adminName"></strong> — اختر التخصص وأنشئ الحسابات
        </div>

        <!-- Default password -->
        <div class="d-flex align-items-center gap-3 mb-4 p-3 rounded-3" style="background:#f8f9fa">
            <i class="bi bi-key-fill fs-4" style="color:var(--secondary-blue)"></i>
            <div class="flex-grow-1">
                <label class="form-label fw-semibold small mb-1">كلمة المرور الافتراضية للأطباء</label>
                <input type="text" class="form-control form-control-sm" id="defaultPass" value="Doctor@123" style="max-width:200px">
            </div>
            <button class="btn btn-outline-secondary btn-sm rounded-3" id="logoutBtn">
                <i class="bi bi-box-arrow-left me-1"></i>خروج
            </button>
        </div>

        <!-- Step 2: Specialty selector -->
        <div class="d-flex align-items-center gap-2 mb-3">
            <span class="step-badge">2</span>
            <span class="fw-semibold">اختر التخصص</span>
        </div>

        <!-- All specialties button -->
        <div class="mb-3">
            <button class="btn btn-outline-primary rounded-5 btn-sm me-2" id="selectAllBtn" onclick="selectAll()">
                <i class="bi bi-check-all me-1"></i>كل التخصصات
            </button>
            <button class="btn btn-outline-secondary rounded-5 btn-sm" onclick="clearSelection()">
                <i class="bi bi-x-circle me-1"></i>إلغاء التحديد
            </button>
        </div>

        <div class="row g-2 mb-4" id="specGrid"></div>

        <!-- Step 3: Doctors list -->
        <div id="doctorsSection" class="d-none">
            <div class="d-flex align-items-center gap-2 mb-3">
                <span class="step-badge">3</span>
                <span class="fw-semibold">أطباء التخصص المختار</span>
                <span class="badge rounded-pill ms-1" style="background:var(--light-blue);color:var(--secondary-blue)" id="docCount">0</span>
            </div>

            <div class="row g-3 mb-3" id="doctorsGrid"></div>

            <!-- Action buttons -->
            <div class="d-flex gap-2 flex-wrap mb-3">
                <button class="btn text-white rounded-5 fw-bold px-4" style="background:var(--secondary-blue)" id="createAllBtn">
                    <i class="bi bi-cloud-upload me-2"></i>إنشاء كل الحسابات
                </button>
                <button class="btn btn-outline-success rounded-5 px-4" id="createSelectedBtn">
                    <i class="bi bi-person-check me-2"></i>إنشاء المحددين فقط
                </button>
            </div>
        </div>

        <!-- Log -->
        <div class="log-box" id="logBox">
            <span class="info">// اختر تخصصاً للبدء...</span>
        </div>

        <!-- Summary -->
        <div id="summaryBox" class="mt-3 d-none">
            <div class="alert alert-success rounded-3 small">
                <i class="bi bi-check-circle-fill me-2"></i>
                <span id="summaryText"></span>
            </div>
            <div class="d-flex gap-2 flex-wrap">
                <a href="login.html" class="btn text-white rounded-5 px-4" style="background:var(--secondary-blue)">
                    <i class="bi bi-box-arrow-in-right me-2"></i>تسجيل الدخول كطبيب
                </a>
                <a href="dashboard.html" class="btn btn-outline-primary rounded-5 px-4">
                    <i class="bi bi-grid me-2"></i>لوحة التحكم
                </a>
            </div>
        </div>
    </div>

</div>

<script src="../js/doctors-data.js"></script>
<script type="module">
import { initializeApp }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword,
         createUserWithEmailAndPassword, signOut, onAuthStateChanged }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, setDoc, serverTimestamp, collection, query, where, getDocs, getDoc }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey:            "AIzaSyCOwMMVo4uyqY4g_pDcDFTvwmq1mXzlsbU",
    authDomain:        "al-shifa-clinic-a7816.firebaseapp.com",
    projectId:         "al-shifa-clinic-a7816",
    storageBucket:     "al-shifa-clinic-a7816.firebasestorage.app",
    messagingSenderId: "867976308051",
    appId:             "1:867976308051:web:b8fcfe1c879ed5c8e42da6"
};
const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);

// لو في حد مسجل دخول مسبقاً، تحقق من الـ role
onAuthStateChanged(auth, async (user) => {
    if (!user) return; // مش مسجل — يفضل على صفحة الـ login الداخلية
    const snap = await getDoc(doc(db, 'users', user.uid));
    const data = snap.exists() ? snap.data() : {};
    if (data.role === 'doctor')  { window.location.href = 'dashboard.html'; return; }
    if (data.role === 'patient') { window.location.href = 'patient.html';   return; }
    // admin أو مش محدد → يفضل هنا ويظهر الـ main section
    if (data.role === 'admin') {
        adminEmail_ = user.email;
        document.getElementById('authSection').classList.add('d-none');
        document.getElementById('mainSection').classList.remove('d-none');
        document.getElementById('adminName').textContent = user.email;
        buildSpecGrid();
    }
});

// ===== State =====
let selectedSpecIds = new Set();
let selectedDocIds  = new Set();
let adminEmail_     = '';
let adminPass_      = '';

// ===== Log =====
function log(msg, type = 'ok') {
    const box  = document.getElementById('logBox');
    const line = document.createElement('div');
    line.className   = type;
    line.textContent = `[${new Date().toLocaleTimeString('ar')}] ${msg}`;
    box.appendChild(line);
    box.scrollTop = box.scrollHeight;
}

function setProgress(pct) {
    // optional progress indicator in log
    document.getElementById('logBox').scrollTop = document.getElementById('logBox').scrollHeight;
}

// ===== Auth =====
document.getElementById('loginBtn').onclick = async () => {
    const email = document.getElementById('adminEmail').value.trim();
    const pass  = document.getElementById('adminPass').value;
    if (!email || !pass) { showAuthAlert('أدخل البريد وكلمة المرور', 'warning'); return; }
    try {
        const cred = await signInWithEmailAndPassword(auth, email, pass);
        adminEmail_ = email;
        adminPass_  = pass;
        onLogin(cred.user);
    } catch (err) {
        const msgs = {
            'auth/invalid-credential': 'البريد أو كلمة المرور غلط',
            'auth/user-not-found':     'الحساب غير موجود — اضغط إنشاء Admin',
            'auth/wrong-password':     'كلمة المرور غلط',
        };
        showAuthAlert(msgs[err.code] || err.message, 'danger');
    }
};

document.getElementById('createAdminBtn').onclick = async () => {
    const email = document.getElementById('adminEmail').value.trim();
    const pass  = document.getElementById('adminPass').value;
    if (!email || !pass) { showAuthAlert('أدخل البريد وكلمة المرور', 'warning'); return; }
    if (pass.length < 6) { showAuthAlert('كلمة المرور 6 أحرف على الأقل', 'warning'); return; }
    try {
        const cred = await createUserWithEmailAndPassword(auth, email, pass);
        await setDoc(doc(db, 'users', cred.user.uid), {
            email, role: 'admin', name: 'Admin', createdAt: serverTimestamp()
        });
        adminEmail_ = email;
        adminPass_  = pass;
        onLogin(cred.user);
    } catch (err) {
        const msgs = { 'auth/email-already-in-use': 'الحساب موجود — استخدم تسجيل الدخول' };
        showAuthAlert(msgs[err.code] || err.message, 'danger');
    }
};

document.getElementById('logoutBtn').onclick = async () => {
    await signOut(auth);
    document.getElementById('authSection').classList.remove('d-none');
    document.getElementById('mainSection').classList.add('d-none');
    log('تم تسجيل الخروج', 'warn');
};

function onLogin(user) {
    document.getElementById('authSection').classList.add('d-none');
    document.getElementById('mainSection').classList.remove('d-none');
    document.getElementById('adminName').textContent = user.email;
    log(`تم تسجيل الدخول: ${user.email}`, 'info');
    buildSpecGrid();
}

function showAuthAlert(msg, type) {
    const el = document.getElementById('authAlert');
    el.className = `alert alert-${type} small rounded-3`;
    el.textContent = msg;
    el.classList.remove('d-none');
}

// ===== Build specialty grid =====
function buildSpecGrid() {
    const grid = document.getElementById('specGrid');
    grid.innerHTML = SPECIALTIES.map(s => `
        <div class="col-6 col-md-4 col-lg-3">
            <div class="spec-btn" data-id="${s.id}" onclick="toggleSpec('${s.id}', this)">
                <i class="bi ${s.icon}" style="color:var(--secondary-blue)"></i>
                <small>${s.name}</small>
                <span class="badge rounded-pill mt-1" style="background:var(--light-blue);color:var(--secondary-blue);font-size:.7rem">
                    ${s.doctors.length} طبيب
                </span>
            </div>
        </div>`).join('');
}

// ===== Toggle specialty =====
window.toggleSpec = (id, el) => {
    if (selectedSpecIds.has(id)) {
        selectedSpecIds.delete(id);
        el.classList.remove('selected');
    } else {
        selectedSpecIds.add(id);
        el.classList.add('selected');
    }
    renderDoctorsGrid();
};

window.selectAll = () => {
    SPECIALTIES.forEach(s => {
        selectedSpecIds.add(s.id);
        document.querySelector(`.spec-btn[data-id="${s.id}"]`)?.classList.add('selected');
    });
    renderDoctorsGrid();
};

window.clearSelection = () => {
    selectedSpecIds.clear();
    document.querySelectorAll('.spec-btn').forEach(b => b.classList.remove('selected'));
    document.getElementById('doctorsSection').classList.add('d-none');
};

// ===== Render doctors grid =====
function renderDoctorsGrid() {
    const section = document.getElementById('doctorsSection');
    const grid    = document.getElementById('doctorsGrid');

    const doctors = SPECIALTIES
        .filter(s => selectedSpecIds.has(s.id))
        .flatMap(s => s.doctors.map(d => ({ ...d, specId: s.id, specName: s.name, specIcon: s.icon })));

    if (!doctors.length) { section.classList.add('d-none'); return; }

    section.classList.remove('d-none');
    document.getElementById('docCount').textContent = `${doctors.length} طبيب`;

    grid.innerHTML = doctors.map(d => `
        <div class="col-12 col-md-6">
            <div class="doc-card p-3 d-flex align-items-center gap-3" id="card-${d.id}">
                <input type="checkbox" class="form-check-input doc-check flex-shrink-0"
                       id="chk-${d.id}" value="${d.id}" checked style="width:18px;height:18px">
                <img src="${d.img}" class="doc-img flex-shrink-0" alt="${d.name}"
                     onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(d.name)}&background=0d47a1&color=fff'">
                <div class="flex-grow-1 min-w-0">
                    <p class="fw-bold mb-0 small">${d.name}</p>
                    <small class="text-muted d-block">${d.title}</small>
                    <small class="text-muted">
                        <i class="bi ${d.specIcon} me-1"></i>${d.specName}
                    </small>
                </div>
                <div class="text-end flex-shrink-0" id="status-${d.id}">
                    <small class="text-muted d-block" style="font-size:.72rem">
                        ${d.id}@alshifa-clinic.com
                    </small>
                    <span class="badge rounded-pill" style="background:#e9ecef;color:#555;font-size:.7rem" id="badge-${d.id}">
                        لم يُنشأ
                    </span>
                </div>
            </div>
        </div>`).join('');
}

// ===== Create accounts =====
document.getElementById('createAllBtn').onclick = () => createAccounts(false);
document.getElementById('createSelectedBtn').onclick = () => createAccounts(true);

async function createAccounts(selectedOnly) {
    const defaultPass = document.getElementById('defaultPass').value || 'Doctor@123';
    const doctors = SPECIALTIES
        .filter(s => selectedSpecIds.has(s.id))
        .flatMap(s => s.doctors.map(d => ({ ...d, specId: s.id, specName: s.name })));

    const targets = selectedOnly
        ? doctors.filter(d => document.getElementById(`chk-${d.id}`)?.checked)
        : doctors;

    if (!targets.length) { log('لا يوجد أطباء محددون', 'warn'); return; }

    document.getElementById('createAllBtn').disabled = true;
    document.getElementById('createSelectedBtn').disabled = true;
    document.getElementById('summaryBox').classList.add('d-none');

    let created = 0, skipped = 0, failed = 0, done = 0;
    const total = targets.length;

    log(`═══ بدء إنشاء ${targets.length} حساب ═══`, 'info');

    for (const doctor of targets) {
        const email = `${doctor.id}@alshifa-clinic.com`;
        const card  = document.getElementById(`card-${doctor.id}`);
        const badge = document.getElementById(`badge-${doctor.id}`);

        card?.classList.add('loading');
        badge.textContent = 'جاري...';
        badge.style.background = '#cfe2ff';
        badge.style.color = '#084298';

        let uid = null;

        // إنشاء حساب Auth
        try {
            const cred = await createUserWithEmailAndPassword(auth, email, defaultPass);
            uid = cred.user.uid;
            created++;
            log(`✓ تم إنشاء: ${email}`, 'ok');

            // احفظ في Firestore فوراً وانت لسه logged in كـ doctor
            const docData = {
                id:        doctor.id,
                name:      doctor.name,
                title:     doctor.title,
                exp:       doctor.exp,
                img:       doctor.img,
                specId:    doctor.specId,
                specName:  doctor.specName,
                specialty: doctor.specName,
                email,
                role:      'doctor',
                uid,
                doctorId:  doctor.id,
                createdAt: serverTimestamp()
            };
            await setDoc(doc(db, 'doctors', doctor.id), docData);
            await setDoc(doc(db, 'users', uid), docData);
            log(`✓ Firestore: ${doctor.name}`, 'ok');

            // أرجع للـ admin
            await signInWithEmailAndPassword(auth, adminEmail_, adminPass_);

            badge.textContent = '✓ تم';
            badge.style.background = '#d1e7dd';
            badge.style.color = '#0f5132';
            card?.classList.remove('loading');
            card?.classList.add('created');
            done++;
            setProgress(Math.round(done / total * 100));
            continue; // تخطى الـ Firestore block التاني
        } catch (err) {
            if (err.code === 'auth/email-already-in-use') {
                skipped++;
                log(`↷ موجود مسبقاً: ${email}`, 'warn');
                badge.textContent = 'موجود مسبقاً';
                badge.style.background = '#fff3cd';
                badge.style.color = '#856404';
                card?.classList.remove('loading');
                card?.classList.add('created');
                // حاول تجيب الـ uid من Firestore
                try {
                    const q = query(collection(db, 'doctors'), where('email', '==', email));
                    const snap = await getDocs(q);
                    if (!snap.empty) uid = snap.docs[0].data().uid || null;
                } catch {}
            } else {
                failed++;
                log(`✗ فشل: ${email} — ${err.message}`, 'err');
                badge.textContent = 'فشل';
                badge.style.background = '#f8d7da';
                badge.style.color = '#842029';
                card?.classList.remove('loading');
                card?.classList.add('failed');
                continue;
            }
        }

        // حفظ في Firestore للحسابات الموجودة مسبقاً (skipped)
        try {
            const docData = {
                id:        doctor.id,
                name:      doctor.name,
                title:     doctor.title,
                exp:       doctor.exp,
                img:       doctor.img,
                specId:    doctor.specId,
                specName:  doctor.specName,
                specialty: doctor.specName,
                email,
                role:      'doctor',
                createdAt: serverTimestamp()
            };
            await setDoc(doc(db, 'doctors', doctor.id), docData);
            if (uid) {
                await setDoc(doc(db, 'users', uid), { ...docData, uid, doctorId: doctor.id });
            }
            log(`✓ Firestore updated: ${doctor.name}`, 'ok');
            badge.textContent = '✓ محدّث';
            badge.style.background = '#d1e7dd';
            badge.style.color = '#0f5132';
            card?.classList.remove('loading');
            card?.classList.add('created');
        } catch (err) {
            log(`✗ Firestore فشل ${doctor.name}: ${err.message}`, 'err');
            card?.classList.remove('loading');
            card?.classList.add('failed');
        }
    }

    log(`═══ انتهى — جديد: ${created} | موجود: ${skipped} | فشل: ${failed} ═══`, 'info');

    document.getElementById('summaryBox').classList.remove('d-none');
    document.getElementById('summaryText').textContent =
        `تم إنشاء ${created} حساب جديد — ${skipped} موجود مسبقاً — ${failed} فشل. كلمة المرور: ${defaultPass}`;

    document.getElementById('createAllBtn').disabled = false;
    document.getElementById('createSelectedBtn').disabled = false;
}
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
